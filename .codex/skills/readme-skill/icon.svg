<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Document base -->
  <rect x="10" y="6" width="34" height="44" rx="3" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <!-- Folded corner -->
  <path d="M36 6 L44 14 L36 14 Z" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Text lines -->
  <rect x="16" y="20" width="22" height="2.5" rx="1" fill="#38bdf8" opacity="0.9"/>
  <rect x="16" y="26" width="18" height="2.5" rx="1" fill="#38bdf8" opacity="0.6"/>
  <rect x="16" y="32" width="20" height="2.5" rx="1" fill="#38bdf8" opacity="0.4"/>
  <rect x="16" y="38" width="14" height="2.5" rx="1" fill="#38bdf8" opacity="0.25"/>
  <!-- Paintbrush / wand overlay -->
  <g transform="translate(30, 28) rotate(-45)">
    <rect x="0" y="0" width="6" height="26" rx="3" fill="url(#grad)" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="1" y="22" width="4" height="6" rx="1" fill="#fbbf24"/>
  </g>
  <!-- Sparkles -->
  <circle cx="52" cy="16" r="2" fill="#fbbf24"/>
  <circle cx="56" cy="24" r="1.2" fill="#f472b6"/>
  <circle cx="48" cy="10" r="1.5" fill="#38bdf8"/>
  <circle cx="54" cy="32" r="1" fill="#fbbf24" opacity="0.7"/>
  <!-- 4-point star sparkle -->
  <path d="M50 20 L51 17 L52 20 L55 21 L52 22 L51 25 L50 22 L47 21 Z" fill="#fbbf24" opacity="0.9"/>
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
