name: Feature Request
description: 提出一个新功能或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出改进想法。请尽量把场景和目标讲清楚，这会帮助我们判断优先级和实现方式。
  - type: textarea
    id: background
    attributes:
      label: 背景与动机
      description: 这个需求是为了解决什么问题？
      placeholder: 当前用户在创建行程时无法快速复制历史模板，导致重复输入较多。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望系统如何工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 有没有考虑过其他实现方式？
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - frontend
        - backend
        - docs
        - product
        - other
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: 预期收益
      description: 这个改动会给用户或开发者带来什么价值？
    validations:
      required: true
